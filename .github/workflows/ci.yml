name: POS CI

on:
  push:
    branches: [ "P-1", "main", "master" ]
  pull_request:
    branches: [ "P-1", "main", "master" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install Dependencies
        working-directory: ./backend
        run: npm ci
      - name: Run Lint
        working-directory: ./backend
        run: npm run lint
      - name: Run Tests
        working-directory: ./backend
        run: npm run test

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Run Lint
        working-directory: ./frontend
        run: npm run lint
      - name: Run Tests
        working-directory: ./frontend
        run: npm run test
