name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-backend:
    name: Backend — Lint + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: test
      JWT_SECRET: ci_test_secret
      REDIS_SKIP: true
      MONGO_URI: mongodb://localhost:27017/tastystation_test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run ESLint
        working-directory: ./backend
        run: npm run lint

      - name: Run Vitest tests
        working-directory: ./backend
        run: npm test

      - name: Upload backend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend/coverage/
            backend/test_output.txt
          retention-days: 7
          if-no-files-found: ignore

  test-frontend:
    name: Frontend — Lint + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: Run Vitest tests
        working-directory: ./frontend
        run: npm test

      - name: Build production bundle
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:3000

      - name: Upload frontend build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3
          if-no-files-found: ignore

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Backend npm audit
        working-directory: ./backend
        run: npm audit --audit-level=high || true

      - name: Frontend npm audit
        working-directory: ./frontend
        run: npm audit --audit-level=high || true

  build-status:
    name: Build Status
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, security-audit]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "Backend: ${{ needs.test-backend.result }}"
          echo "Frontend: ${{ needs.test-frontend.result }}"
          echo "Security: ${{ needs.security-audit.result }}"
          if [ "${{ needs.test-backend.result }}" = "failure" ] || [ "${{ needs.test-frontend.result }}" = "failure" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          echo "✅ Build passed"
